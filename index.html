<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Franz Plumbing Management System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Variables ─────────────────────────────────────────────────────────── */
:root {
  --navy:        #1B3A6B;
  --navy-dark:   #132B52;
  --navy-light:  #2A4E8A;
  --orange:      #E07B18;
  --orange-dark: #C56A12;
  --light-blue:  #D4E1F7;
  --white:       #FFFFFF;
  --gray-100:    #F4F6FA;
  --gray-200:    #E8ECF4;
  --gray-400:    #9BA8BE;
  --gray-600:    #5A6880;
  --gray-800:    #2C3A4F;
  --success:     #16A34A;
  --error:       #DC2626;
  --warning:     #D97706;
  --radius:      8px;
  --shadow:      0 2px 12px rgba(27,58,107,0.12);
  --shadow-lg:   0 8px 32px rgba(27,58,107,0.18);
}

/* ── Reset ─────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-100); color: var(--gray-800); min-height: 100vh; }
button { cursor: pointer; font-family: inherit; border: none; outline: none; }
input, select, textarea { font-family: inherit; outline: none; }
a { text-decoration: none; color: inherit; }

/* ── Login Screen ──────────────────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, var(--navy) 0%, var(--navy-dark) 60%, #0D1F3C 100%);
  position: relative;
  overflow: hidden;
}

/* water-drop decorative circles */
#login-screen::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: rgba(255,255,255,0.03);
  top: -200px; right: -150px;
}
#login-screen::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: rgba(224,123,24,0.07);
  bottom: -100px; left: -100px;
}

.login-card {
  background: var(--white);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  padding: 48px 44px 40px;
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
}

.login-logo {
  display: flex;
  justify-content: center;
  margin-bottom: 32px;
}

.login-tagline {
  text-align: center;
  color: var(--gray-600);
  font-size: 13px;
  margin-top: -20px;
  margin-bottom: 32px;
  letter-spacing: 0.3px;
}

.login-title {
  text-align: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--light-blue);
}

.form-group {
  margin-bottom: 18px;
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.form-group input {
  width: 100%;
  padding: 11px 14px;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  font-size: 14px;
  color: var(--gray-800);
  background: var(--gray-100);
  transition: border-color 0.2s, background 0.2s;
}
.form-group input:focus {
  border-color: var(--navy);
  background: var(--white);
}

.btn-login {
  width: 100%;
  padding: 13px;
  background: var(--orange);
  color: var(--white);
  font-size: 15px;
  font-weight: 700;
  border-radius: var(--radius);
  margin-top: 8px;
  letter-spacing: 0.3px;
  transition: background 0.2s, transform 0.1s;
}
.btn-login:hover { background: var(--orange-dark); }
.btn-login:active { transform: scale(0.99); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

.login-error {
  background: #FEE2E2;
  color: var(--error);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 13px;
  margin-top: 12px;
  display: none;
}
.login-error.show { display: block; }

.login-footer {
  text-align: center;
  margin-top: 28px;
  color: var(--gray-400);
  font-size: 12px;
}

/* ── App shell ──────────────────────────────────────────────────────────── */
#app {
  display: none;
  min-height: 100vh;
  flex-direction: row;
}
#app.visible { display: flex; }

/* Sidebar */
#sidebar {
  width: 240px;
  min-height: 100vh;
  background: var(--navy-dark);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}
.sidebar-logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-nav {
  flex: 1;
  padding: 10px 0;
  overflow-y: auto;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 11px 18px;
  color: rgba(255,255,255,0.72);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.07); color: var(--white); }
.nav-item.active {
  background: rgba(224,123,24,0.15);
  color: var(--white);
  border-left-color: var(--orange);
}
.nav-item .nav-icon { font-size: 17px; width: 22px; text-align: center; }
.nav-item.locked { opacity: 0.45; cursor: not-allowed; }
.nav-item.locked:hover { background: none; }
.nav-badge {
  margin-left: auto;
  background: var(--orange);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
}
.nav-section-label {
  padding: 16px 18px 4px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.3);
}
.sidebar-bottom {
  padding: 14px 18px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.sidebar-user {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.user-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--orange);
  color: white;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.user-info { overflow: hidden; }
.user-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.user-role {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  text-transform: capitalize;
}
.btn-logout {
  width: 100%;
  padding: 8px;
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  border-radius: 6px;
  transition: background 0.15s, color 0.15s;
}
.btn-logout:hover { background: rgba(220,38,38,0.2); color: #FCA5A5; }

/* Main content area */
#main-wrap {
  margin-left: 240px;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Top bar */
#topbar {
  height: 60px;
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}
#topbar-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--navy);
  flex: 1;
}
.topbar-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--gray-100);
  border: 1.5px solid var(--gray-200);
  border-radius: 20px;
  padding: 7px 14px;
  width: 240px;
  transition: border-color 0.2s;
}
.topbar-search:focus-within { border-color: var(--navy); }
.topbar-search input {
  background: none;
  border: none;
  font-size: 13px;
  color: var(--gray-800);
  width: 100%;
}
.topbar-search input::placeholder { color: var(--gray-400); }

/* Page content */
#page-content {
  flex: 1;
  padding: 28px 28px;
  background: var(--gray-100);
}

/* Common UI components */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.page-header h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--navy);
}
.btn {
  padding: 9px 18px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  transition: background 0.15s, transform 0.1s;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--navy); color: var(--white); }
.btn-primary:hover { background: var(--navy-light); }
.btn-orange { background: var(--orange); color: var(--white); }
.btn-orange:hover { background: var(--orange-dark); }
.btn-ghost { background: var(--white); color: var(--navy); border: 1.5px solid var(--gray-200); }
.btn-ghost:hover { border-color: var(--navy); }
.btn-danger { background: #FEE2E2; color: var(--error); }
.btn-danger:hover { background: var(--error); color: white; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  border-left: 4px solid var(--navy);
}
.stat-card.orange { border-left-color: var(--orange); }
.stat-card.green  { border-left-color: var(--success); }
.stat-card.gray   { border-left-color: var(--gray-400); }
.stat-label { font-size: 12px; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 800; color: var(--navy); }
.stat-sub   { font-size: 12px; color: var(--gray-400); margin-top: 2px; }

/* Tables */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-600); border-bottom: 2px solid var(--gray-200); background: var(--gray-100); }
tbody td { padding: 12px 14px; border-bottom: 1px solid var(--gray-200); color: var(--gray-800); vertical-align: middle; }
tbody tr:hover { background: var(--light-blue); }
tbody tr:last-child td { border-bottom: none; }

/* Status badges */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.badge-blue    { background: #DBEAFE; color: #1D4ED8; }
.badge-orange  { background: #FEF3C7; color: #92400E; }
.badge-green   { background: #DCFCE7; color: #166534; }
.badge-red     { background: #FEE2E2; color: #991B1B; }
.badge-gray    { background: var(--gray-200); color: var(--gray-600); }

/* Modal */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,20,40,0.55);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#modal-overlay.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 2px solid var(--light-blue);
}
.modal-header h2 { font-size: 17px; font-weight: 700; color: var(--navy); }
.modal-close {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--gray-100);
  color: var(--gray-600);
  font-size: 18px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: var(--gray-200); }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray-200); display: flex; gap: 10px; justify-content: flex-end; }

/* Forms inside modals */
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--navy); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
.field input, .field select, .field textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius);
  font-size: 14px;
  color: var(--gray-800);
  background: var(--white);
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--navy); }
.field textarea { resize: vertical; min-height: 80px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.field-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--gray-400);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* ── Toast ──────────────────────────────────────────────────────────────── */
#toast-wrap {
  position: fixed;
  bottom: 24px; right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 12px 18px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  color: var(--white);
  box-shadow: var(--shadow);
  animation: slideIn 0.25s ease;
  max-width: 320px;
}
.toast-success { background: var(--success); }
.toast-error   { background: var(--error); }
.toast-warn    { background: var(--warning); }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<script>

// ── Helpers ───────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function hashPwd(p) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Auth ──────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const pass  = document.getElementById('li-pass').value;
  const btn   = document.getElementById('li-btn');
  const err   = document.getElementById('li-err');

  err.classList.remove('show');
  if (!email || !pass) { showErr('Please enter your email and password.'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const hash = await hashPwd(pass);
    const { data, error } = await DB.from('fp_users')
      .select('*')
      .eq('email', email)
      .eq('password_hash', hash)
      .eq('active', true)
      .single();

    if (error || !data) { showErr('Invalid email or password.'); return; }

    CU = data;
    localStorage.setItem('fp_session', JSON.stringify({ id: data.id, email: data.email, name: data.name, role: data.role }));
    startApp();
  } catch(e) {
    showErr('Connection error. Please try again.');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }

  function showErr(msg) {
    err.textContent = msg;
    err.classList.add('show');
  }
}

function doLogout() {
  CU = null;
  localStorage.removeItem('fp_session');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('li-pass').value = '';
}

// allow Enter key on login form
document.getElementById('li-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('li-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('li-pass').focus();
});

let _currentPage = 'dashboard';

function showPage(page) {
  _currentPage = page;
  // Update nav active state
  document.querySelectorAll('.nav-item[data-page]').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  // Update topbar title
  const titles = {
    dashboard: 'Dashboard', customers: 'Customers',
    estimates: 'Estimates', workorders: 'Work Orders',
    dispatch: 'Dispatch', inventory: 'Inventory',
    timeclock: 'Time Clock', admin: 'Admin'
  };
  document.getElementById('topbar-title').textContent = titles[page] || page;
  // Render page
  const pc = document.getElementById('page-content');
  pc.innerHTML = `<div class="empty-state"><div class="empty-icon">🔧</div><p>${titles[page] || page} — coming soon</p></div>`;
  if (page === 'dashboard')  bDashboard();
  if (page === 'customers')  bCustomers();
  if (page === 'estimates')  bEstimates();
  if (page === 'workorders') bWorkOrders();
  if (page === 'dispatch')   bDispatch();
  if (page === 'inventory')  bInventory();
  if (page === 'timeclock')  bTimeClock();
  if (page === 'admin')      bAdmin();
}

// ── Boot ──────────────────────────────────────────────────────────────────
function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');

  // Populate user info in sidebar
  const initials = CU.name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name').textContent   = CU.name;
  document.getElementById('user-role').textContent   = CU.role;

  // Show admin nav if admin
  if (CU.role === 'admin') {
    document.getElementById('nav-admin').style.display = 'flex';
    document.getElementById('nav-admin-label').style.display = 'block';
  }

  showPage('dashboard');
  toast(`Welcome back, ${CU.name}!`);
}

// Check for saved session on load
(function checkSession() {
  const saved = localStorage.getItem('fp_session');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      // Re-verify against DB
      DB.from('fp_users').select('*').eq('id', s.id).eq('active', true).single()
        .then(({ data }) => {
          if (data) { CU = data; startApp(); }
        });
    } catch(e) { localStorage.removeItem('fp_session'); }
  }
})();
