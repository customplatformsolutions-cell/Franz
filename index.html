<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Franz Plumbing Management System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Variables ─────────────────────────────────────────────────────────── */
:root {
  --navy:        #1B3A6B;
  --navy-dark:   #132B52;
  --navy-light:  #2A4E8A;
  --orange:      #E07B18;
  --orange-dark: #C56A12;
  --light-blue:  #D4E1F7;
  --white:       #FFFFFF;
  --gray-100:    #F4F6FA;
  --gray-200:    #E8ECF4;
  --gray-400:    #9BA8BE;
  --gray-600:    #5A6880;
  --gray-800:    #2C3A4F;
  --success:     #16A34A;
  --error:       #DC2626;
  --warning:     #D97706;
  --radius:      8px;
  --shadow:      0 2px 12px rgba(27,58,107,0.12);
  --shadow-lg:   0 8px 32px rgba(27,58,107,0.18);
}

/* ── Reset ─────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-100); color: var(--gray-800); min-height: 100vh; }
button { cursor: pointer; font-family: inherit; border: none; outline: none; }
input, select, textarea { font-family: inherit; outline: none; }
a { text-decoration: none; color: inherit; }

/* ── Login Screen ──────────────────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, var(--navy) 0%, var(--navy-dark) 60%, #0D1F3C 100%);
  position: relative;
  overflow: hidden;
}

/* water-drop decorative circles */
#login-screen::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: rgba(255,255,255,0.03);
  top: -200px; right: -150px;
}
#login-screen::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: rgba(224,123,24,0.07);
  bottom: -100px; left: -100px;
}

.login-card {
  background: var(--white);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  padding: 48px 44px 40px;
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
}

.login-logo {
  display: flex;
  justify-content: center;
  margin-bottom: 32px;
}

.login-tagline {
  text-align: center;
  color: var(--gray-600);
  font-size: 13px;
  margin-top: -20px;
  margin-bottom: 32px;
  letter-spacing: 0.3px;
}

.login-title {
  text-align: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 2px solid var(--light-blue);
}

.form-group {
  margin-bottom: 18px;
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.form-group input {
  width: 100%;
  padding: 11px 14px;
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  font-size: 14px;
  color: var(--gray-800);
  background: var(--gray-100);
  transition: border-color 0.2s, background 0.2s;
}
.form-group input:focus {
  border-color: var(--navy);
  background: var(--white);
}

.btn-login {
  width: 100%;
  padding: 13px;
  background: var(--orange);
  color: var(--white);
  font-size: 15px;
  font-weight: 700;
  border-radius: var(--radius);
  margin-top: 8px;
  letter-spacing: 0.3px;
  transition: background 0.2s, transform 0.1s;
}
.btn-login:hover { background: var(--orange-dark); }
.btn-login:active { transform: scale(0.99); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

.login-error {
  background: #FEE2E2;
  color: var(--error);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 13px;
  margin-top: 12px;
  display: none;
}
.login-error.show { display: block; }

.login-footer {
  text-align: center;
  margin-top: 28px;
  color: var(--gray-400);
  font-size: 12px;
}

/* ── App shell ──────────────────────────────────────────────────────────── */
#app {
  display: none;
  min-height: 100vh;
  flex-direction: row;
}
#app.visible { display: flex; }

/* Sidebar */
#sidebar {
  width: 240px;
  min-height: 100vh;
  background: var(--navy-dark);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}
.sidebar-logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-nav {
  flex: 1;
  padding: 10px 0;
  overflow-y: auto;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 11px 18px;
  color: rgba(255,255,255,0.72);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: rgba(255,255,255,0.07); color: var(--white); }
.nav-item.active {
  background: rgba(224,123,24,0.15);
  color: var(--white);
  border-left-color: var(--orange);
}
.nav-item .nav-icon { font-size: 17px; width: 22px; text-align: center; }
.nav-item.locked { opacity: 0.45; cursor: not-allowed; }
.nav-item.locked:hover { background: none; }
.nav-badge {
  margin-left: auto;
  background: var(--orange);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
}
.nav-section-label {
  padding: 16px 18px 4px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.3);
}
.sidebar-bottom {
  padding: 14px 18px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.sidebar-user {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.user-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--orange);
  color: white;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.user-info { overflow: hidden; }
.user-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.user-role {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  text-transform: capitalize;
}
.btn-logout {
  width: 100%;
  padding: 8px;
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  border-radius: 6px;
  transition: background 0.15s, color 0.15s;
}
.btn-logout:hover { background: rgba(220,38,38,0.2); color: #FCA5A5; }

/* Main content area */
#main-wrap {
  margin-left: 240px;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Top bar */
#topbar {
  height: 60px;
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}
#topbar-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--navy);
  flex: 1;
}
.topbar-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--gray-100);
  border: 1.5px solid var(--gray-200);
  border-radius: 20px;
  padding: 7px 14px;
  width: 240px;
  transition: border-color 0.2s;
}
.topbar-search:focus-within { border-color: var(--navy); }
.topbar-search input {
  background: none;
  border: none;
  font-size: 13px;
  color: var(--gray-800);
  width: 100%;
}
.topbar-search input::placeholder { color: var(--gray-400); }

/* Page content */
#page-content {
  flex: 1;
  padding: 28px 28px;
  background: var(--gray-100);
}

/* Common UI components */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.page-header h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--navy);
}
.btn {
  padding: 9px 18px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  transition: background 0.15s, transform 0.1s;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--navy); color: var(--white); }
.btn-primary:hover { background: var(--navy-light); }
.btn-orange { background: var(--orange); color: var(--white); }
.btn-orange:hover { background: var(--orange-dark); }
.btn-ghost { background: var(--white); color: var(--navy); border: 1.5px solid var(--gray-200); }
.btn-ghost:hover { border-color: var(--navy); }
.btn-danger { background: #FEE2E2; color: var(--error); }
.btn-danger:hover { background: var(--error); color: white; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  border-left: 4px solid var(--navy);
}
.stat-card.orange { border-left-color: var(--orange); }
.stat-card.green  { border-left-color: var(--success); }
.stat-card.gray   { border-left-color: var(--gray-400); }
.stat-label { font-size: 12px; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 800; color: var(--navy); }
.stat-sub   { font-size: 12px; color: var(--gray-400); margin-top: 2px; }

/* Tables */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-600); border-bottom: 2px solid var(--gray-200); background: var(--gray-100); }
tbody td { padding: 12px 14px; border-bottom: 1px solid var(--gray-200); color: var(--gray-800); vertical-align: middle; }
tbody tr:hover { background: var(--light-blue); }
tbody tr:last-child td { border-bottom: none; }

/* Status badges */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.badge-blue    { background: #DBEAFE; color: #1D4ED8; }
.badge-orange  { background: #FEF3C7; color: #92400E; }
.badge-green   { background: #DCFCE7; color: #166534; }
.badge-red     { background: #FEE2E2; color: #991B1B; }
.badge-gray    { background: var(--gray-200); color: var(--gray-600); }

/* Modal */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,20,40,0.55);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#modal-overlay.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 2px solid var(--light-blue);
}
.modal-header h2 { font-size: 17px; font-weight: 700; color: var(--navy); }
.modal-close {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--gray-100);
  color: var(--gray-600);
  font-size: 18px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: var(--gray-200); }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray-200); display: flex; gap: 10px; justify-content: flex-end; }

/* Forms inside modals */
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--navy); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
.field input, .field select, .field textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius);
  font-size: 14px;
  color: var(--gray-800);
  background: var(--white);
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--navy); }
.field textarea { resize: vertical; min-height: 80px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.field-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--gray-400);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* ── Toast ──────────────────────────────────────────────────────────────── */
#toast-wrap {
  position: fixed;
  bottom: 24px; right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 12px 18px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  color: var(--white);
  box-shadow: var(--shadow);
  animation: slideIn 0.25s ease;
  max-width: 320px;
}
.toast-success { background: var(--success); }
.toast-error   { background: var(--error); }
.toast-warn    { background: var(--warning); }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<script>

// ── Helpers ───────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function hashPwd(p) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Auth ──────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const pass  = document.getElementById('li-pass').value;
  const btn   = document.getElementById('li-btn');
  const err   = document.getElementById('li-err');

  err.classList.remove('show');
  if (!email || !pass) { showErr('Please enter your email and password.'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const hash = await hashPwd(pass);
    const { data, error } = await DB.from('fp_users')
      .select('*')
      .eq('email', email)
      .eq('password_hash', hash)
      .eq('active', true)
      .single();

    if (error || !data) { showErr('Invalid email or password.'); return; }

    CU = data;
    localStorage.setItem('fp_session', JSON.stringify({ id: data.id, email: data.email, name: data.name, role: data.role }));
    startApp();
  } catch(e) {
    showErr('Connection error. Please try again.');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }

  function showErr(msg) {
    err.textContent = msg;
    err.classList.add('show');
  }
}

function doLogout() {
  CU = null;
  localStorage.removeItem('fp_session');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('li-pass').value = '';
}

});

async function svCustomer(id) {
  const fn = document.getElementById('cf-fn').value.trim();
  const ln = document.getElementById('cf-ln').value.trim();
  if (!fn || !ln) { toast('First and last name are required', 'warn'); return; }

  const payload = {
    first_name: fn, last_name: ln,
    company:  document.getElementById('cf-co').value.trim() || null,
    phone:    document.getElementById('cf-ph').value.trim() || null,
    email:    document.getElementById('cf-em').value.trim() || null,
    address:  document.getElementById('cf-ad').value.trim() || null,
    city:     document.getElementById('cf-ci').value.trim() || null,
    state:    document.getElementById('cf-st').value.trim().toUpperCase() || null,
    zip:      document.getElementById('cf-zp').value.trim() || null,
    notes:    document.getElementById('cf-no').value.trim() || null,
  };

  let error;
  if (id) {
    ({ error } = await DB.from('fp_customers').update(payload).eq('id', id));
  } else {
    ({ error } = await DB.from('fp_customers').insert(payload));
  }

  if (error) { toast('Save failed: ' + error.message, 'error'); return; }
  toast(id ? 'Customer updated' : 'Customer added');
  closeModal();
  bCustomers();
}

async function delCustomer(id) {

  const { error } = await DB.from('fp_customers').delete().eq('id', id);

  toast('Customer deleted', 'warn');
  closeModal();
  bCustomers();
}

let _lineCount = 0;
function addEstimateLine(data) {
  const i = _lineCount++;
  const pbOpts = `<option value="">— Pricebook —</option>` + _pricebook.map(p=>`<option value="${p.id}" data-price="${p.price}">${esc(p.name)} ($${Number(p.price).toFixed(2)})</option>`).join('');
  const wrap = document.getElementById('ef-lines');
  const div = document.createElement('div');
  div.id = `line-${i}`;
  div.style.cssText = 'display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:center';
  div.innerHTML = `
    <input placeholder="Description" id="ld-${i}" value="${esc(data?.description||'')}" oninput="calcEstTotals()" style="padding:8px;border:1.5px solid var(--gray-200);border-radius:6px;font-size:13px">
    <input type="number" placeholder="Qty" id="lq-${i}" value="${data?.qty||1}" min="0" step="any" oninput="calcEstTotals()" style="padding:8px;border:1.5px solid var(--gray-200);border-radius:6px;font-size:13px;text-align:center">
    <input type="number" placeholder="Price" id="lp-${i}" value="${data?.price||''}" min="0" step="0.01" oninput="calcEstTotals()" style="padding:8px;border:1.5px solid var(--gray-200);border-radius:6px;font-size:13px;text-align:right">
    <button onclick="document.getElementById('line-${i}').remove();calcEstTotals()" style="padding:6px 10px;background:#FEE2E2;color:var(--error);border:none;border-radius:6px;cursor:pointer;font-size:14px">×</button>`;
  // Pricebook picker row
  const pbRow = document.createElement('div');
  pbRow.style.cssText = 'margin-bottom:10px;margin-top:-4px';
  pbRow.innerHTML = `<select onchange="pickPbItem(this,${i})" style="width:100%;padding:6px 10px;border:1.5px solid var(--gray-200);border-radius:6px;font-size:12px;color:var(--gray-600)">${pbOpts}</select>`;
  wrap.appendChild(div);
  wrap.appendChild(pbRow);
}

function pickPbItem(sel, i) {
  const opt = sel.options[sel.selectedIndex];
  if (!opt.value) return;
  document.getElementById(`ld-${i}`).value = opt.text.replace(/ \(\$[\d.]+\)$/,'');
  document.getElementById(`lp-${i}`).value = opt.dataset.price;
  document.getElementById(`lq-${i}`).value = 1;
  calcEstTotals();
  sel.selectedIndex = 0;
}

function calcEstTotals() {
  let subtotal = 0;
  document.querySelectorAll('[id^="lq-"]').forEach(qEl => {
    const i = qEl.id.split('-')[1];
    const q = parseFloat(qEl.value)||0;
    const p = parseFloat(document.getElementById(`lp-${i}`)?.value)||0;
    subtotal += q * p;
  });
  const rate = parseFloat(document.getElementById('ef-tax-rate')?.value)||0;
  const tax  = subtotal * rate / 100;
  const total = subtotal + tax;
  const s = el => document.getElementById(el);
  if(s('ef-subtotal')) s('ef-subtotal').textContent = '$'+subtotal.toFixed(2);
  if(s('ef-tax'))      s('ef-tax').textContent      = '$'+tax.toFixed(2);
  if(s('ef-total'))    s('ef-total').textContent    = '$'+total.toFixed(2);
}

function getEstimateLines() {
  const lines = [];
  document.querySelectorAll('[id^="lq-"]').forEach(qEl => {
    const i = qEl.id.split('-')[1];
    const desc  = document.getElementById(`ld-${i}`)?.value.trim();
    const qty   = parseFloat(qEl.value)||0;
    const price = parseFloat(document.getElementById(`lp-${i}`)?.value)||0;
    if (desc || qty || price) lines.push({ description: desc, qty, price, total: qty*price });
  });
  return lines;
}

async function svEstimate(id) {
  const custId = document.getElementById('ef-cust').value;
  const num    = document.getElementById('ef-num').value.trim();
  if (!custId) { toast('Please select a customer', 'warn'); return; }
  if (!num)    { toast('Estimate number is required', 'warn'); return; }

  const lines    = getEstimateLines();
  const taxRate  = parseFloat(document.getElementById('ef-tax-rate').value)||0;
  const subtotal = lines.reduce((s,l)=>s+l.total,0);
  const tax      = subtotal * taxRate / 100;

  const payload = {
    customer_id:     custId,
    estimate_number: num,
    status:          document.getElementById('ef-status').value,
    line_items:      lines,
    subtotal, tax_rate: taxRate, tax,
    total:           subtotal + tax,
    notes:           document.getElementById('ef-notes').value.trim() || null,
    valid_until:     document.getElementById('ef-valid').value || null,
    created_by:      CU.id
  };

  let error;
  if (id) {
    ({ error } = await DB.from('fp_estimates').update(payload).eq('id', id));
  } else {
    ({ error } = await DB.from('fp_estimates').insert(payload));
  }
  if (error) { toast('Save failed: ' + error.message, 'error'); return; }
  toast(id ? 'Estimate updated' : 'Estimate created');
  closeModal();
  bEstimates();
}

  const nextS = next.toISOString().slice(0,10);
  const isToday = _dispDate === new Date().toISOString().slice(0,10);

  const badgeClass = s => ({Scheduled:'badge-blue','In Progress':'badge-orange',Completed:'badge-green','On Hold':'badge-gray'}[s]||'badge-gray');

  // Group WOs by tech (unassigned gets own bucket)
  const byTech = {};
  dayWOs.forEach(w => {
    const key = w.tech_id || '__unassigned__';
    if (!byTech[key]) byTech[key] = [];
    byTech[key].push(w);
  });

  // Build tech rows — show all techs + any with jobs
  const techIds = new Set([..._users.map(u=>u.id), ...Object.keys(byTech)]);

  const techRows = [...techIds].map(tid => {
    const tech = _users.find(u=>u.id===tid);
    const name = tid === '__unassigned__' ? 'Unassigned' : (tech?.name || 'Unknown');
    const jobs = byTech[tid] || [];
    return `
      <div class="card" style="margin-bottom:16px;padding:0;overflow:hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--navy);color:white">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:34px;height:34px;border-radius:50%;background:${tid==='__unassigned__'?'rgba(255,255,255,0.2)':'var(--orange)'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">
              ${tid==='__unassigned__'?'?':name.split(' ').map(w=>w[0]).slice(0,2).join('')}
            </div>
            <div>
              <div style="font-weight:700;font-size:15px">${esc(name)}</div>
              <div style="font-size:11px;opacity:0.6">${jobs.length} job${jobs.length!==1?'s':''} today</div>
            </div>
          </div>
          <button class="btn btn-sm" style="background:var(--orange);color:white" onclick="oAddWO();document.getElementById('wf-date').value='${_dispDate}';${tid!=='__unassigned__'?`document.getElementById('wf-tech').value='${tid}'`:''}">+ Add Job</button>
        </div>
        ${jobs.length === 0
          ? `<div style="padding:24px;text-align:center;color:var(--gray-400);font-size:13px">No jobs scheduled</div>`
          : `<div style="padding:12px 16px;display:flex;flex-direction:column;gap:10px">
              ${jobs.map(w => {
                const c = w.fp_customers;
                const custName = c ? `${c.first_name} ${c.last_name}` : '—';
                return `
                  <div style="display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--gray-100);border-radius:8px;border-left:4px solid ${w.status==='Completed'?'#16A34A':w.status==='In Progress'?'#D97706':'#2563EB'}">
                    <div style="min-width:64px;text-align:center">
                      <div style="font-weight:700;font-size:14px;color:var(--navy)">${esc(w.scheduled_start||'—')}</div>
                      ${w.scheduled_end?`<div style="font-size:11px;color:var(--gray-400)">${esc(w.scheduled_end)}</div>`:''}
                    </div>
                    <div style="flex:1;min-width:0">
                      <div style="font-weight:700;color:var(--navy)">${esc(w.wo_number)} — ${esc(custName)}</div>
                      <div style="font-size:13px;color:var(--gray-600);margin-top:2px">${esc((w.description||'No description').slice(0,80))}</div>
                      ${c?.phone?`<div style="font-size:12px;color:var(--gray-400);margin-top:2px">📞 ${esc(c.phone)}</div>`:''}
                    </div>
                    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
                      <span class="badge ${badgeClass(w.status)}">${esc(w.status)}</span>
                      <div style="display:flex;gap:6px">
                        ${w.status!=='In Progress'&&w.status!=='Completed'?`<button class="btn btn-sm" style="background:#FEF3C7;color:#92400E;font-size:11px" onclick="quickStatusWO('${w.id}','In Progress')">▶ Start</button>`:''}
                        ${w.status!=='Completed'?`<button class="btn btn-sm" style="background:#DCFCE7;color:#166534;font-size:11px" onclick="quickStatusWO('${w.id}','Completed')">✓ Done</button>`:''}
                        <button class="btn btn-sm btn-ghost" style="font-size:11px" onclick="oEditWO('${w.id}')">✏️</button>
                      </div>
                    </div>
                  </div>`;
              }).join('')}
            </div>`
        }
      </div>`;
  }).join('');

  const unschHtml = (unscheduled||[]).length === 0 ? '' : `
    <div class="card" style="margin-top:8px;padding:0;overflow:hidden">
      <div style="padding:14px 18px;background:var(--gray-600);color:white;font-weight:700">
        📋 Unscheduled Open Jobs (${unscheduled.length})
      </div>
      <div style="padding:12px 16px;display:flex;flex-direction:column;gap:8px">
        ${(unscheduled||[]).map(w=>{
          const c = w.fp_customers;
          return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--gray-100);border-radius:8px">
            <div>
              <div style="font-weight:600;color:var(--navy)">${esc(w.wo_number)} — ${c?esc(c.first_name)+' '+esc(c.last_name):'—'}</div>
              <div style="font-size:12px;color:var(--gray-600)">${esc((w.description||'No description').slice(0,60))}</div>
            </div>
            <button class="btn btn-sm btn-ghost" onclick="oEditWO('${w.id}')">Schedule →</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  pc.innerHTML = `
    <div class="page-header" style="margin-bottom:20px">
      <h1>Dispatch Board</h1>
      <button class="btn btn-orange" onclick="oAddWO();setTimeout(()=>{document.getElementById('wf-date').value='${_dispDate}'},50)">+ Schedule Job</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
      <button class="btn btn-ghost" onclick="bDispatch('${prevS}')">← Prev</button>
      <div style="flex:1;text-align:center">
        <div style="font-size:18px;font-weight:700;color:var(--navy)">${label}</div>
        ${isToday?`<div style="font-size:12px;color:var(--orange);font-weight:600">TODAY</div>`:''}
      </div>
      <button class="btn btn-ghost" onclick="bDispatch('${nextS}')">Next →</button>
      <button class="btn btn-ghost btn-sm" onclick="bDispatch('${new Date().toISOString().slice(0,10)}')">Today</button>
      <input type="date" value="${_dispDate}" onchange="bDispatch(this.value)" style="padding:8px 10px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:13px;color:var(--navy)">
    </div>
    <div style="background:var(--light-blue);border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;gap:24px;font-size:13px">
      <span>📋 <strong>${dayWOs.length}</strong> jobs today</span>
      <span>✓ <strong>${dayWOs.filter(w=>w.status==='Completed').length}</strong> completed</span>
      <span>▶ <strong>${dayWOs.filter(w=>w.status==='In Progress').length}</strong> in progress</span>
      <span>🕐 <strong>${dayWOs.filter(w=>w.status==='Scheduled').length}</strong> scheduled</span>
    </div>
    ${techRows}
    ${unschHtml}`;
}

async function quickStatusWO(id, status) {
  const { error } = await DB.from('fp_work_orders').update({status}).eq('id',id);
  if (error) { toast('Update failed','error'); return; }
  toast(`Marked ${status}`);
  bDispatch();
}
// ── INVENTORY ────────────────────────────────────────────────────────────
let _invItems = [], _invLocations = [], _invStock = [], _invTab = 'stock';

async function bInventory() {
  const pc = document.getElementById('page-content');
  pc.innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><p>Loading…</p></div>`;
  const [itemRes, locRes, stockRes] = await Promise.all([
    DB.from('fp_inv_items').select('*').eq('active',true).order('name'),
    DB.from('fp_inv_locations').select('*').eq('active',true).order('name'),
    DB.from('fp_inv_stock').select('*, fp_inv_items(name,sku,category,unit), fp_inv_locations(name,type)')
  ]);
  _invItems     = itemRes.data  || [];
  _invLocations = locRes.data   || [];
  _invStock     = stockRes.data || [];
  renderInvTab();
}

function renderInvTab() {
  const tabs = ['stock','items','transfers'];
  const labels = {stock:'📦 Stock Levels', items:'🔩 Items', transfers:'🔄 Transfer Log'};
  const pc = document.getElementById('page-content');
  pc.innerHTML = `
    <div class="page-header">
      <h1>Inventory</h1>
      <div style="display:flex;gap:8px">
        ${_invTab==='stock'    ? `<button class="btn btn-ghost" onclick="oTransfer()">🔄 Transfer Stock</button>` : ''}
        ${_invTab==='items'    ? `<button class="btn btn-orange" onclick="oAddInvItem()">+ Add Item</button>` : ''}
        ${_invTab==='transfers'? `` : ''}
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:20px">
      ${tabs.map(t=>`<button class="btn btn-sm ${_invTab===t?'btn-primary':'btn-ghost'}" onclick="_invTab='${t}';renderInvTab()">${labels[t]}</button>`).join('')}
    </div>
    <div id="inv-body"></div>`;
  if (_invTab==='stock')     renderInvStock();
  if (_invTab==='items')     renderInvItems();
  if (_invTab==='transfers') renderInvTransfers();
}

function renderInvStock() {
  const body = document.getElementById('inv-body');
  if (_invLocations.length === 0) {
    body.innerHTML = `<div class="empty-state"><p>No locations set up yet — add them in Admin</p></div>`;
    return;
  }
  body.innerHTML = _invLocations.map(loc => {
    const locStock = _invStock.filter(s => s.location_id === loc.id && s.quantity > 0);
    const icon = loc.type === 'van' ? '🚐' : '🏭';
    return `
      <div class="card" style="margin-bottom:16px;padding:0;overflow:hidden">
        <div style="padding:14px 18px;background:var(--navy);color:white;display:flex;align-items:center;justify-content:space-between">
          <div style="font-weight:700;font-size:15px">${icon} ${esc(loc.name)}</div>
          <span style="font-size:12px;opacity:0.6;text-transform:uppercase;letter-spacing:1px">${loc.type}</span>
        </div>
        ${locStock.length === 0
          ? `<div style="padding:20px;text-align:center;color:var(--gray-400);font-size:13px">No stock at this location</div>`
          : `<div class="table-wrap"><table>
              <thead><tr><th>Item</th><th>SKU</th><th>Category</th><th>Unit</th><th style="text-align:right">Qty</th><th>Actions</th></tr></thead>
              <tbody>
                ${locStock.map(s=>`
                  <tr>
                    <td><strong>${esc(s.fp_inv_items?.name||'—')}</strong></td>
                    <td style="font-size:12px;color:var(--gray-400)">${esc(s.fp_inv_items?.sku||'—')}</td>
                    <td><span class="badge badge-blue" style="font-size:10px">${esc(s.fp_inv_items?.category||'—')}</span></td>
                    <td style="font-size:13px">${esc(s.fp_inv_items?.unit||'Each')}</td>
                    <td style="text-align:right;font-weight:700;color:${s.quantity<=2?'var(--error)':'var(--navy)'}">${s.quantity}</td>
                    <td><button class="btn btn-sm btn-ghost" onclick="oTransfer('${s.item_id}','${loc.id}')">Transfer</button></td>
                  </tr>`).join('')}
              </tbody>
            </table></div>`
        }
      </div>`;
  }).join('');
}

function renderInvItems() {
  document.getElementById('inv-body').innerHTML = `
    <div class="card" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>SKU</th><th>Category</th><th>Unit</th><th>Cost</th><th>Sale Price</th><th>Actions</th></tr></thead>
          <tbody>
            ${_invItems.length === 0
              ? `<tr><td colspan="7"><div class="empty-state"><p>No items yet — add your first one</p></div></td></tr>`
              : _invItems.map(i=>`
                <tr>
                  <td><strong>${esc(i.name)}</strong></td>
                  <td style="font-size:12px;color:var(--gray-400)">${esc(i.sku||'—')}</td>
                  <td><span class="badge badge-blue" style="font-size:10px">${esc(i.category||'—')}</span></td>
                  <td style="font-size:13px">${esc(i.unit)}</td>
                  <td>$${Number(i.cost_price||0).toFixed(2)}</td>
                  <td><strong>$${Number(i.sale_price||0).toFixed(2)}</strong></td>
                  <td><button class="btn btn-sm btn-ghost" onclick="oEditInvItem('${i.id}')">✏️ Edit</button></td>
                </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

async function renderInvTransfers() {
  const { data } = await DB.from('fp_inv_transfers')
    .select('*, fp_inv_items(name), from:from_location_id(name), to:to_location_id(name), fp_users(name)')
    .order('transferred_at',{ascending:false}).limit(100);
  document.getElementById('inv-body').innerHTML = `
    <div class="card" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Item</th><th>Qty</th><th>From</th><th>To</th><th>By</th><th>Notes</th></tr></thead>
          <tbody>
            ${!data||data.length===0
              ? `<tr><td colspan="7"><div class="empty-state"><p>No transfers yet</p></div></td></tr>`
              : data.map(t=>`
                <tr>
                  <td style="font-size:12px;color:var(--gray-400)">${new Date(t.transferred_at).toLocaleDateString()}</td>
                  <td><strong>${esc(t.fp_inv_items?.name||'—')}</strong></td>
                  <td style="font-weight:700;color:var(--navy)">${t.quantity}</td>
                  <td>${esc(t.from?.name||'—')}</td>
                  <td>${esc(t.to?.name||'—')}</td>
                  <td style="font-size:13px">${esc(t.fp_users?.name||'—')}</td>
                  <td style="font-size:12px;color:var(--gray-600)">${esc(t.notes||'—')}</td>
                </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function oTransfer(prefillItemId, prefillFromId) {
  const itemOpts = _invItems.map(i=>`<option value="${i.id}" ${i.id===prefillItemId?'selected':''}>${esc(i.name)}${i.sku?' ('+esc(i.sku)+')':''}</option>`).join('');
  const locOpts  = id => _invLocations.map(l=>`<option value="${l.id}" ${l.id===id?'selected':''}>${l.type==='van'?'🚐':'🏭'} ${esc(l.name)}</option>`).join('');
  showModal(`
    <div class="modal">
      <div class="modal-header"><h2>Transfer Stock</h2><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <div class="field"><label>Item *</label>
          <select id="tf-item"><option value="">— Select Item —</option>${itemOpts}</select>
        </div>
        <div class="field-row">
          <div class="field"><label>From Location *</label>
            <select id="tf-from"><option value="">— Select —</option>${locOpts(prefillFromId)}</select>
          </div>
          <div class="field"><label>To Location *</label>
            <select id="tf-to"><option value="">— Select —</option>${locOpts()}</select>
          </div>
        </div>
        <div class="field"><label>Quantity *</label>
          <input id="tf-qty" type="number" min="0.01" step="any" placeholder="1">
        </div>
        <div class="field"><label>Notes</label>
          <input id="tf-notes" placeholder="e.g. Loading van for job WO-0001">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-orange" onclick="svTransfer()">Transfer</button>
      </div>
    </div>`);
}

async function svTransfer() {
  const itemId = document.getElementById('tf-item').value;
  const fromId = document.getElementById('tf-from').value;
  const toId   = document.getElementById('tf-to').value;
  const qty    = parseFloat(document.getElementById('tf-qty').value);
  if (!itemId||!fromId||!toId) { toast('Please fill all required fields','warn'); return; }
  if (!qty||qty<=0)            { toast('Quantity must be greater than 0','warn'); return; }
  if (fromId===toId)           { toast('From and To locations must be different','warn'); return; }

  // Deduct from source, add to destination
  const deduct = async () => {
    const { data: src } = await DB.from('fp_inv_stock').select('*').eq('item_id',itemId).eq('location_id',fromId).single();
    if (!src || src.quantity < qty) { toast('Not enough stock at source location','error'); return false; }
    await DB.from('fp_inv_stock').update({quantity: src.quantity - qty, updated_at: new Date().toISOString()}).eq('id',src.id);
    return true;
  };
  const add = async () => {
    const { data: dst } = await DB.from('fp_inv_stock').select('*').eq('item_id',itemId).eq('location_id',toId).single();
    if (dst) {
      await DB.from('fp_inv_stock').update({quantity: dst.quantity + qty, updated_at: new Date().toISOString()}).eq('id',dst.id);
    } else {
      await DB.from('fp_inv_stock').insert({item_id:itemId, location_id:toId, quantity:qty});
    }
  };

  if (!await deduct()) return;
  await add();
  await DB.from('fp_inv_transfers').insert({
    item_id:fromId, from_location_id:fromId, to_location_id:toId,
    item_id:itemId, quantity:qty,
    notes: document.getElementById('tf-notes').value.trim()||null,
    transferred_by: CU.id
  });
  toast('Transfer complete');
  closeModal();
  bInventory();
}

function invItemModal(item) {
  const isEdit = !!item;
  return `
    <div class="modal">
      <div class="modal-header"><h2>${isEdit?'Edit Item':'Add Item'}</h2><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <div class="field"><label>Name *</label><input id="if-name" value="${isEdit?esc(item.name):''}"></div>
        <div class="field-row">
          <div class="field"><label>SKU</label><input id="if-sku" value="${isEdit?esc(item.sku||''):''}"></div>
          <div class="field"><label>Category</label><input id="if-cat" value="${isEdit?esc(item.category||''):''}" placeholder="e.g. Fittings"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Unit</label>
            <select id="if-unit">${['Each','Box','Foot','Gallon','Bag','Roll'].map(u=>`<option ${(isEdit?item.unit:'')==='Each'&&u==='Each'?'selected':(isEdit&&item.unit===u?'selected':'')}>${u}</option>`).join('')}</select>
          </div>
          <div class="field"><label>Cost Price ($)</label><input id="if-cost" type="number" min="0" step="0.01" value="${isEdit?item.cost_price||'':''}" placeholder="0.00"></div>
        </div>
        <div class="field"><label>Sale Price ($)</label><input id="if-sale" type="number" min="0" step="0.01" value="${isEdit?item.sale_price||'':''}" placeholder="0.00"></div>
      </div>
      <div class="modal-footer">
        ${isEdit?`<button class="btn btn-danger btn-sm" onclick="delInvItem('${item.id}')">🗑 Delete</button>`:''}
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-orange" onclick="svInvItem(${isEdit?`'${item.id}'`:null})">Save</button>
      </div>
    </div>`;
}

function oAddInvItem()      { showModal(invItemModal(null)); }
function oEditInvItem(id)   { showModal(invItemModal(_invItems.find(i=>i.id===id))); }

async function svInvItem(id) {
  const name = document.getElementById('if-name').value.trim();
  if (!name) { toast('Item name is required','warn'); return; }
  const payload = {
    name, sku: document.getElementById('if-sku').value.trim()||null,
    category:   document.getElementById('if-cat').value.trim()||null,
    unit:       document.getElementById('if-unit').value,
    cost_price: parseFloat(document.getElementById('if-cost').value)||0,
    sale_price: parseFloat(document.getElementById('if-sale').value)||0,
  };
  let error;
  if (id) { ({error} = await DB.from('fp_inv_items').update(payload).eq('id',id)); }
  else    { ({error} = await DB.from('fp_inv_items').insert(payload)); }
  if (error) { toast('Save failed: '+error.message,'error'); return; }
  toast(id?'Item updated':'Item added');
  closeModal();
  bInventory();
}

async function delInvItem(id) {
  if (!confirm('Delete this item?')) return;
  await DB.from('fp_inv_items').update({active:false}).eq('id',id);
  toast('Item removed','warn');
  closeModal();
  bInventory();
}
function bTimeClock()  { document.getElementById('page-content').innerHTML = '<div class="empty-state"><div class="empty-icon">⏱️</div><p>Time Clock coming in Piece 9</p></div>'; }
function bAdmin()      { document.getElementById('page-content').innerHTML = '<div class="empty-state"><div class="empty-icon">⚙️</div><p>Admin coming in Piece 10</p></div>'; }

// ── Boot ──────────────────────────────────────────────────────────────────
function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');

  // Populate user info in sidebar
  const initials = CU.name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name').textContent   = CU.name;
  document.getElementById('user-role').textContent   = CU.role;

  // Show admin nav if admin
  if (CU.role === 'admin') {
    document.getElementById('nav-admin').style.display = 'flex';
    document.getElementById('nav-admin-label').style.display = 'block';
  }

  showPage('dashboard');
  toast(`Welcome back, ${CU.name}!`);
}

// Check for saved session on load
(function checkSession() {
  const saved = localStorage.getItem('fp_session');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      // Re-verify against DB
      DB.from('fp_users').select('*').eq('id', s.id).eq('active', true).single()
        .then(({ data }) => {
          if (data) { CU = data; startApp(); }
        });
    } catch(e) { localStorage.removeItem('fp_session'); }
  }
})();
</script>
